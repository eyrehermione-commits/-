<!DOCTYPE html>

<html lang="zh">

<head>

  <meta charset="UTF-8">

  <title>
    Spatial Knowledge Graph Platform
  </title>

  <link
    rel="stylesheet"
    href="style.css"
  >

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  >

</head>

<body>

  <!-- 工具栏 -->

  <div id="toolbar">

    <button id="toggleRoads">

      展开交通要素

    </button>

  </div>

  <!-- 主界面 -->

  <div id="container">

    <!-- 图谱 -->

    <div id="graph"></div>

    <!-- 地图 -->

    <div id="map"></div>

  </div>

  <!-- 底部属性面板 -->

  <div id="panel">

    属性面板

  </div>

  <!-- JS -->

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>

  <script type="module" src="js/main.js"></script>

</body>

</html>
